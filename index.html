<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAG Task Scheduler — Interactive Visualizer</title>
<meta name="description" content="Interactive DAG-based task scheduler with topological sorting, cycle detection, parallel wave grouping, and critical path analysis.">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════
   DESIGN SYSTEM
   ═══════════════════════════════════════════════ */
:root {
  --bg-primary: #0a0e1a;
  --bg-secondary: #111827;
  --bg-card: rgba(17, 24, 39, 0.7);
  --bg-glass: rgba(255, 255, 255, 0.03);
  --border-glass: rgba(255, 255, 255, 0.08);
  --border-accent: rgba(99, 102, 241, 0.3);
  --text-primary: #f1f5f9;
  --text-secondary: #94a3b8;
  --text-dim: #64748b;
  --accent-indigo: #818cf8;
  --accent-violet: #a78bfa;
  --accent-cyan: #22d3ee;
  --accent-emerald: #34d399;
  --accent-amber: #fbbf24;
  --accent-rose: #fb7185;
  --accent-pink: #f472b6;
  --gradient-primary: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  --gradient-success: linear-gradient(135deg, #34d399 0%, #06b6d4 100%);
  --gradient-danger: linear-gradient(135deg, #f43f5e 0%, #e11d48 100%);
  --gradient-wave: linear-gradient(135deg, #818cf8 0%, #c084fc 100%);
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.3);
  --shadow-md: 0 4px 20px rgba(0,0,0,0.4);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.5);
  --shadow-glow: 0 0 30px rgba(99, 102, 241, 0.15);
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Background animated mesh */
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background:
    radial-gradient(ellipse 80% 60% at 10% 20%, rgba(99,102,241,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 60% 80% at 90% 80%, rgba(168,85,247,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 50% 50% at 50% 50%, rgba(34,211,238,0.03) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

/* ═══════════════════════════════════════════════
   LAYOUT
   ═══════════════════════════════════════════════ */
.app { position: relative; z-index: 1; }

.header {
  padding: 28px 40px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border-glass);
  backdrop-filter: blur(20px);
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(10, 14, 26, 0.85);
}

.logo {
  display: flex;
  align-items: center;
  gap: 14px;
}

.logo-icon {
  width: 42px; height: 42px;
  background: var(--gradient-primary);
  border-radius: var(--radius-md);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  box-shadow: 0 0 20px rgba(99,102,241,0.3);
}

.logo-text h1 {
  font-size: 20px;
  font-weight: 700;
  background: linear-gradient(135deg, #e0e7ff, #a5b4fc);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: -0.3px;
}

.logo-text span {
  font-size: 11px;
  color: var(--text-dim);
  font-weight: 500;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.header-stats {
  display: flex;
  gap: 24px;
}

.stat-chip {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 14px;
  background: var(--bg-glass);
  border: 1px solid var(--border-glass);
  border-radius: 100px;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-secondary);
  transition: var(--transition);
}

.stat-chip .num {
  font-family: 'JetBrains Mono', monospace;
  color: var(--accent-indigo);
  font-weight: 600;
}

.main-grid {
  display: grid;
  grid-template-columns: 320px 1fr;
  gap: 0;
  min-height: calc(100vh - 80px);
}

/* ═══════════════════════════════════════════════
   SIDEBAR
   ═══════════════════════════════════════════════ */
.sidebar {
  border-right: 1px solid var(--border-glass);
  padding: 24px 20px;
  display: flex;
  flex-direction: column;
  gap: 20px;
  overflow-y: auto;
  max-height: calc(100vh - 80px);
  background: rgba(17, 24, 39, 0.3);
}

.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-track { background: transparent; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border-glass); border-radius: 4px; }

.panel {
  background: var(--bg-card);
  border: 1px solid var(--border-glass);
  border-radius: var(--radius-lg);
  padding: 18px;
  backdrop-filter: blur(10px);
  transition: var(--transition);
}

.panel:hover {
  border-color: var(--border-accent);
  box-shadow: var(--shadow-glow);
}

.panel-title {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: var(--text-dim);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.panel-title .dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent-indigo);
  box-shadow: 0 0 8px var(--accent-indigo);
}

/* Demo Buttons */
.demo-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.demo-btn {
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-glass);
  background: var(--bg-glass);
  color: var(--text-secondary);
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
  text-align: center;
  position: relative;
  overflow: hidden;
}

.demo-btn::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: var(--gradient-primary);
  opacity: 0;
  transition: var(--transition);
}

.demo-btn:hover {
  border-color: var(--accent-indigo);
  color: var(--text-primary);
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(99,102,241,0.2);
}

.demo-btn:hover::before { opacity: 0.15; }

.demo-btn span { position: relative; z-index: 1; }

.demo-btn .demo-label {
  display: block;
  font-size: 10px;
  color: var(--text-dim);
  font-weight: 400;
  margin-top: 2px;
}

.demo-btn.cycle-btn:hover { border-color: var(--accent-rose); box-shadow: 0 4px 12px rgba(244,63,94,0.2); }

/* Form inputs */
.form-group {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 12px;
}

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.form-group label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.8px;
}

.form-input {
  padding: 9px 12px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-glass);
  background: rgba(0, 0, 0, 0.3);
  color: var(--text-primary);
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  outline: none;
  transition: var(--transition);
  width: 100%;
}

.form-input:focus {
  border-color: var(--accent-indigo);
  box-shadow: 0 0 0 3px rgba(99,102,241,0.1);
}

.form-input::placeholder { color: var(--text-dim); }

.btn-primary {
  width: 100%;
  padding: 10px 16px;
  border-radius: var(--radius-sm);
  border: none;
  background: var(--gradient-primary);
  color: white;
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  transition: var(--transition);
  letter-spacing: 0.3px;
}

.btn-primary:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 20px rgba(99,102,241,0.35);
}

.btn-primary:active { transform: translateY(0); }

.btn-schedule {
  background: var(--gradient-success);
  font-size: 14px;
  padding: 14px 16px;
  border-radius: var(--radius-md);
  letter-spacing: 0.5px;
}

.btn-schedule:hover { box-shadow: 0 6px 20px rgba(52,211,153,0.3); }

.btn-danger {
  background: rgba(244,63,94,0.1);
  border: 1px solid rgba(244,63,94,0.2);
  color: var(--accent-rose);
}

.btn-danger:hover {
  background: rgba(244,63,94,0.2);
  box-shadow: 0 6px 20px rgba(244,63,94,0.15);
}

/* Task list */
.task-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
  max-height: 180px;
  overflow-y: auto;
}

.task-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 10px;
  background: rgba(0,0,0,0.2);
  border-radius: var(--radius-sm);
  border: 1px solid transparent;
  transition: var(--transition);
  animation: slideIn 0.3s ease;
}

@keyframes slideIn {
  from { opacity: 0; transform: translateX(-10px); }
  to { opacity: 1; transform: translateX(0); }
}

.task-item:hover { border-color: var(--border-glass); }

.task-item-info {
  display: flex;
  align-items: center;
  gap: 8px;
}

.task-id {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  font-weight: 600;
  color: var(--accent-cyan);
}

.task-name {
  font-size: 11px;
  color: var(--text-dim);
}

.task-remove {
  width: 20px; height: 20px;
  border-radius: 4px;
  border: none;
  background: transparent;
  color: var(--text-dim);
  font-size: 14px;
  cursor: pointer;
  transition: var(--transition);
  display: flex;
  align-items: center;
  justify-content: center;
}

.task-remove:hover { background: rgba(244,63,94,0.2); color: var(--accent-rose); }

/* ═══════════════════════════════════════════════
   MAIN CONTENT
   ═══════════════════════════════════════════════ */
.content {
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.graph-container {
  flex: 1;
  position: relative;
  min-height: 400px;
  overflow: hidden;
}

.graph-container canvas {
  width: 100%;
  height: 100%;
  display: block;
}

.graph-empty {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  color: var(--text-dim);
  pointer-events: none;
}

.graph-empty .icon { font-size: 48px; margin-bottom: 12px; opacity: 0.3; }
.graph-empty p { font-size: 14px; font-weight: 500; }
.graph-empty span { font-size: 12px; opacity: 0.6; }

/* ═══════════════════════════════════════════════
   RESULTS PANEL (bottom)
   ═══════════════════════════════════════════════ */
.results-panel {
  border-top: 1px solid var(--border-glass);
  background: rgba(17, 24, 39, 0.5);
  backdrop-filter: blur(10px);
  max-height: 50vh;
  overflow-y: auto;
  animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.results-header {
  padding: 16px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border-glass);
  position: sticky;
  top: 0;
  background: rgba(17, 24, 39, 0.95);
  backdrop-filter: blur(10px);
  z-index: 10;
}

.results-title {
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 700;
  font-size: 14px;
}

.results-title .status-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
}

.results-title .status-dot.success {
  background: var(--accent-emerald);
  box-shadow: 0 0 10px var(--accent-emerald);
}

.results-title .status-dot.error {
  background: var(--accent-rose);
  box-shadow: 0 0 10px var(--accent-rose);
}

.results-stats {
  display: flex;
  gap: 20px;
}

.results-stats .stat {
  font-size: 12px;
  color: var(--text-secondary);
}

.results-stats .stat strong {
  color: var(--text-primary);
  font-family: 'JetBrains Mono', monospace;
}

.results-body {
  padding: 20px 28px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

.result-section {
  background: rgba(0,0,0,0.2);
  border: 1px solid var(--border-glass);
  border-radius: var(--radius-md);
  padding: 16px;
}

.result-section.full-width {
  grid-column: 1 / -1;
}

.result-section-title {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-dim);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}

/* Waves */
.wave-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  animation: fadeInWave 0.4s ease forwards;
  opacity: 0;
}

.wave-row:last-child { border-bottom: none; }

@keyframes fadeInWave {
  to { opacity: 1; }
}

.wave-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 600;
  color: var(--accent-violet);
  min-width: 50px;
}

.wave-badge {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 100px;
  font-weight: 600;
  min-width: 75px;
  text-align: center;
}

.wave-badge.parallel {
  background: rgba(52,211,153,0.1);
  color: var(--accent-emerald);
  border: 1px solid rgba(52,211,153,0.2);
}

.wave-badge.bottleneck {
  background: rgba(251,191,36,0.1);
  color: var(--accent-amber);
  border: 1px solid rgba(251,191,36,0.2);
}

.wave-tasks {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.wave-task-chip {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  padding: 3px 10px;
  background: rgba(129,140,248,0.08);
  border: 1px solid rgba(129,140,248,0.15);
  border-radius: 100px;
  color: var(--accent-indigo);
  font-weight: 500;
}

.wave-task-chip.critical {
  background: rgba(244,114,182,0.1);
  border-color: rgba(244,114,182,0.25);
  color: var(--accent-pink);
}

/* Critical path */
.critical-path-flow {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 4px;
}

.critical-node {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  padding: 4px 12px;
  background: rgba(244,114,182,0.1);
  border: 1px solid rgba(244,114,182,0.2);
  border-radius: var(--radius-sm);
  color: var(--accent-pink);
  font-weight: 600;
}

.critical-arrow {
  color: var(--text-dim);
  font-size: 14px;
}

.critical-duration {
  font-family: 'JetBrains Mono', monospace;
  font-size: 18px;
  font-weight: 800;
  background: linear-gradient(135deg, var(--accent-pink), var(--accent-violet));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 10px;
}

/* Execution order */
.exec-flow {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 3px;
}

.exec-node {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text-secondary);
  padding: 2px 6px;
}

.exec-arrow { color: var(--text-dim); font-size: 10px; }

/* Cycle error */
.cycle-error {
  padding: 20px 28px;
  animation: slideUp 0.4s ease;
}

.cycle-error-box {
  background: rgba(244,63,94,0.05);
  border: 1px solid rgba(244,63,94,0.2);
  border-radius: var(--radius-md);
  padding: 20px;
}

.cycle-error-title {
  display: flex;
  align-items: center;
  gap: 8px;
  font-weight: 700;
  color: var(--accent-rose);
  margin-bottom: 12px;
}

.cycle-path {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 6px;
}

.cycle-node {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  padding: 4px 14px;
  background: rgba(244,63,94,0.1);
  border: 1px solid rgba(244,63,94,0.3);
  border-radius: var(--radius-sm);
  color: var(--accent-rose);
  font-weight: 600;
}

.cycle-arrow { color: var(--accent-rose); font-size: 16px; }

/* Bottleneck list */
.bottleneck-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 0;
  font-size: 12px;
}

.bottleneck-icon { color: var(--accent-amber); }
.bottleneck-id {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 600;
  color: var(--accent-amber);
}

/* ═══════════════════════════════════════════════
   TOOLTIP
   ═══════════════════════════════════════════════ */
.tooltip {
  position: fixed;
  padding: 10px 14px;
  background: rgba(17, 24, 39, 0.95);
  border: 1px solid var(--border-accent);
  border-radius: var(--radius-sm);
  font-size: 12px;
  pointer-events: none;
  z-index: 1000;
  box-shadow: var(--shadow-md);
  backdrop-filter: blur(10px);
  display: none;
  max-width: 220px;
}

.tooltip .tt-id {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700;
  color: var(--accent-cyan);
  margin-bottom: 4px;
}

.tooltip .tt-row {
  color: var(--text-secondary);
  font-size: 11px;
  line-height: 1.5;
}

/* ═══════════════════════════════════════════════
   RESPONSIVE
   ═══════════════════════════════════════════════ */
@media (max-width: 900px) {
  .main-grid {
    grid-template-columns: 1fr;
  }
  .sidebar {
    max-height: none;
    border-right: none;
    border-bottom: 1px solid var(--border-glass);
  }
  .results-body {
    grid-template-columns: 1fr;
  }
}

/* ═══════════════════════════════════════════════
   TOAST NOTIFICATIONS
   ═══════════════════════════════════════════════ */
.toast-container {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.toast {
  padding: 10px 18px;
  border-radius: var(--radius-sm);
  font-size: 12px;
  font-weight: 600;
  color: white;
  animation: toastIn 0.3s ease, toastOut 0.3s ease 2.5s forwards;
  box-shadow: var(--shadow-md);
}

.toast.success { background: linear-gradient(135deg, #059669, #0d9488); }
.toast.error { background: linear-gradient(135deg, #e11d48, #be123c); }
.toast.info { background: linear-gradient(135deg, #4f46e5, #7c3aed); }

@keyframes toastIn {
  from { opacity: 0; transform: translateX(30px); }
  to { opacity: 1; transform: translateX(0); }
}

@keyframes toastOut {
  to { opacity: 0; transform: translateX(30px); }
}
</style>
</head>
<body>

<div class="app">
  <!-- ────────── HEADER ────────── -->
  <header class="header">
    <div class="logo">
      <div class="logo-icon">⬡</div>
      <div class="logo-text">
        <h1>DAG Task Scheduler</h1>
        <span>Kahn's Algorithm · O(V+E)</span>
      </div>
    </div>
    <div class="header-stats">
      <div class="stat-chip">🔵 Tasks <span class="num" id="statTasks">0</span></div>
      <div class="stat-chip">🔗 Edges <span class="num" id="statEdges">0</span></div>
      <div class="stat-chip">🌊 Waves <span class="num" id="statWaves">—</span></div>
    </div>
  </header>

  <!-- ────────── MAIN ────────── -->
  <div class="main-grid">

    <!-- SIDEBAR -->
    <aside class="sidebar">

      <!-- DEMOS -->
      <div class="panel">
        <div class="panel-title"><span class="dot"></span> Load Demo</div>
        <div class="demo-grid">
          <button class="demo-btn" onclick="loadDemo('cooking')">
            <span>🍳 Cooking<span class="demo-label">Dinner party</span></span>
          </button>
          <button class="demo-btn" onclick="loadDemo('basic')">
            <span>⛓ Basic<span class="demo-label">4-task chain</span></span>
          </button>
          <button class="demo-btn" onclick="loadDemo('complex')">
            <span>🌐 Complex<span class="demo-label">10-task DAG</span></span>
          </button>
          <button class="demo-btn" onclick="loadDemo('build')">
            <span>🔨 Build<span class="demo-label">C++ pipeline</span></span>
          </button>
          <button class="demo-btn cycle-btn" onclick="loadDemo('cycle')">
            <span>🔄 Cycle<span class="demo-label">Error demo</span></span>
          </button>
        </div>
      </div>

      <!-- ADD TASK -->
      <div class="panel">
        <div class="panel-title"><span class="dot"></span> Add Task</div>
        <div class="form-group">

<script>
// ═══════════════════════════════════════════════
//  TASK SCHEDULER ENGINE (ported from C++)
// ═══════════════════════════════════════════════

class TaskScheduler {
  constructor() {
    this.tasks = new Map();   // id → {id, name, duration_ms, priority}
    this.adj = new Map();     // id → [dependents]
    this.radj = new Map();    // id → [dependencies]
    this.edgeCount = 0;
  }

  addTask(t) {
    if (!t.id || this.tasks.has(t.id)) return false;
    this.tasks.set(t.id, { ...t });
    if (!this.adj.has(t.id)) this.adj.set(t.id, []);
    if (!this.radj.has(t.id)) this.radj.set(t.id, []);
    return true;
  }

  addDependency(from, to) {
    if (!this.tasks.has(from) || !this.tasks.has(to)) return false;
    if (from === to) return false;
    const vec = this.adj.get(from);
    if (vec.includes(to)) return false;
    vec.push(to);
    this.radj.get(to).push(from);
    this.edgeCount++;
    return true;
  }

  removeTask(id) {
    if (!this.tasks.has(id)) return false;
    for (const dep of this.radj.get(id)) {
      const v = this.adj.get(dep);
      const idx = v.indexOf(id);
      if (idx !== -1) { v.splice(idx, 1); this.edgeCount--; }
    }
    for (const dep of this.adj.get(id)) {
      const v = this.radj.get(dep);
      const idx = v.indexOf(id);
      if (idx !== -1) { v.splice(idx, 1); this.edgeCount--; }
    }
    this.adj.delete(id);
    this.radj.delete(id);
    this.tasks.delete(id);
    return true;
  }

  clear() {
    this.tasks.clear();
    this.adj.clear();
    this.radj.clear();
    this.edgeCount = 0;
  }

  dependentsOf(id) { return this.adj.get(id) || []; }
  dependenciesOf(id) { return this.radj.get(id) || []; }

  detectCycle() {
    const WHITE = 0, GRAY = 1, BLACK = 2;
    const color = new Map();
    const parent = new Map();
    for (const id of this.tasks.keys()) color.set(id, WHITE);

    const dfs = (u) => {
      color.set(u, GRAY);
      for (const v of this.adj.get(u)) {
        if (color.get(v) === GRAY) {
          const cyclePath = [v, u];
          let cur = u;
          while (cur !== v) {
            cur = parent.get(cur);
            cyclePath.push(cur);
          }
          cyclePath.reverse();
          return cyclePath;
        }
        if (color.get(v) === WHITE) {
          parent.set(v, u);
          const res = dfs(v);
          if (res) return res;
        }
      }
      color.set(u, BLACK);
      return null;
    };

    for (const id of this.tasks.keys()) {
      if (color.get(id) === WHITE) {
        const res = dfs(id);
        if (res) return res;
      }
    }
    return null;
  }

  schedule() {
    const result = {
      success: false,
      executionOrder: [],
      parallelWaves: [],
      bottlenecks: [],
      cycle: null,
      criticalPath: [],
      criticalPathDuration: 0
    };

    // 1. Cycle detection
    const cycle = this.detectCycle();
    if (cycle) {
      result.cycle = cycle;
      return result;
    }

    // 2. In-degree
    const inDegree = new Map();
    for (const id of this.tasks.keys()) inDegree.set(id, 0);
    for (const [u, nbrs] of this.adj) {
      for (const v of nbrs) inDegree.set(v, inDegree.get(v) + 1);
    }

    // 3. Wave levels via BFS
    const waveLevel = new Map();
    for (const id of this.tasks.keys()) waveLevel.set(id, 0);
    const tmpIndeg = new Map(inDegree);
    const bfsQ = [];
    for (const [id, deg] of tmpIndeg) {
      if (deg === 0) bfsQ.push(id);
    }
    let head = 0;
    while (head < bfsQ.length) {
      const u = bfsQ[head++];
      for (const v of this.adj.get(u)) {
        waveLevel.set(v, Math.max(waveLevel.get(v), waveLevel.get(u) + 1));
        tmpIndeg.set(v, tmpIndeg.get(v) - 1);
        if (tmpIndeg.get(v) === 0) bfsQ.push(v);
      }
    }

    // 4. Group into waves
    let maxWave = 0;
    for (const lv of waveLevel.values()) maxWave = Math.max(maxWave, lv);
    for (let i = 0; i <= maxWave; i++) result.parallelWaves.push([]);
    for (const [id, lv] of waveLevel) result.parallelWaves[lv].push(id);

    // Sort each wave by priority desc then name
    for (const wave of result.parallelWaves) {
      wave.sort((a, b) => {
        const pa = this.tasks.get(a).priority, pb = this.tasks.get(b).priority;
        if (pa !== pb) return pb - pa;
        return a < b ? -1 : a > b ? 1 : 0;
      });
    }

    // 5. Kahn's sort → flat execution order
    const kahnIndeg = new Map(inDegree);
    const pq = [];
    for (const [id, deg] of kahnIndeg) {
      if (deg === 0) pq.push(id);
    }
    pq.sort((a, b) => {
      const pa = this.tasks.get(a).priority, pb = this.tasks.get(b).priority;
      if (pa !== pb) return pb - pa;
      return a < b ? -1 : 1;
    });

    while (pq.length > 0) {
      const u = pq.shift();
      result.executionOrder.push(u);
      for (const v of this.adj.get(u)) {
        kahnIndeg.set(v, kahnIndeg.get(v) - 1);
        if (kahnIndeg.get(v) === 0) {
          pq.push(v);
          pq.sort((a, b) => {
            const pa = this.tasks.get(a).priority, pb = this.tasks.get(b).priority;
            if (pa !== pb) return pb - pa;
            return a < b ? -1 : 1;
          });
        }
      }
    }

    // 6. Bottlenecks
    for (const wave of result.parallelWaves) {
      if (wave.length === 1) result.bottlenecks.push(wave[0]);
    }

    // 7. Critical path
    const dist = new Map();
    const prev = new Map();
    for (const [id, t] of this.tasks) dist.set(id, t.duration_ms);

    // Topological order
    const topo = [...this.tasks.keys()];
    topo.sort((a, b) => waveLevel.get(a) - waveLevel.get(b));

    for (const u of topo) {
      for (const v of this.adj.get(u)) {
        const candidate = dist.get(u) + this.tasks.get(v).duration_ms;
        if (candidate > dist.get(v)) {
          dist.set(v, candidate);
          prev.set(v, u);
        }
      }
    }

    let endNode = '', maxDist = -Infinity;
    for (const [id, d] of dist) {
      if (d > maxDist) { maxDist = d; endNode = id; }
    }

    const path = [];
    for (let cur = endNode; cur; cur = prev.get(cur) || '') {
      path.push(cur);
      if (!prev.has(cur)) break;
    }
    path.reverse();
    result.criticalPath = path;
    result.criticalPathDuration = 0;
    for (const id of path) result.criticalPathDuration += this.tasks.get(id).duration_ms;

    result.success = true;
    return result;
  }
}

const scheduler = new TaskScheduler();
let lastResult = null;
let nodePositions = new Map(); // id → {x, y}
let hoveredNode = null;

// ═══════════════════════════════════════════════
//  UI FUNCTIONS
// ═══════════════════════════════════════════════

function toast(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

function updateStats() {
  document.getElementById('statTasks').textContent = scheduler.tasks.size;
  document.getElementById('statEdges').textContent = scheduler.edgeCount;
  document.getElementById('statWaves').textContent = lastResult?.success ? lastResult.parallelWaves.length : '—';
}

function updateTaskList() {
  const list = document.getElementById('taskList');
  if (scheduler.tasks.size === 0) {
    list.innerHTML = '<div style="color: var(--text-dim); font-size: 12px; text-align: center; padding: 12px;">No tasks yet</div>';
    return;
  }
  list.innerHTML = '';
  for (const [id, t] of scheduler.tasks) {
    const item = document.createElement('div');
    item.className = 'task-item';
    item.innerHTML = `
      <div class="task-item-info">
        <span class="task-id">${id}</span>
        <span class="task-name">${t.name} · ${t.duration_ms}ms · p${t.priority}</span>
      </div>
      <button class="task-remove" onclick="removeTask('${id}')">✕</button>
    `;
    list.appendChild(item);
  }
}

function addTask() {
  const id = document.getElementById('taskId').value.trim();
  const name = document.getElementById('taskName').value.trim() || id;
  const dur = parseInt(document.getElementById('taskDur').value) || 100;
  const pri = parseInt(document.getElementById('taskPri').value) || 0;
  if (!id) { toast('Task ID is required', 'error'); return; }
  if (scheduler.addTask({ id, name, duration_ms: dur, priority: pri })) {
    toast(`Task '${id}' added`, 'success');
    document.getElementById('taskId').value = '';
    document.getElementById('taskName').value = '';
    refresh();
  } else {
    toast(`Task '${id}' already exists`, 'error');
  }
}

function addDependency() {
  const from = document.getElementById('depFrom').value.trim();
  const to = document.getElementById('depTo').value.trim();
  if (!from || !to) { toast('Both fields required', 'error'); return; }
  if (scheduler.addDependency(from, to)) {
    toast(`Edge ${from} → ${to} added`, 'success');
    document.getElementById('depFrom').value = '';
    document.getElementById('depTo').value = '';
    refresh();
  } else {
    toast('Could not add edge (unknown task or duplicate)', 'error');
  }
}

function removeTask(id) {
  scheduler.removeTask(id);
  toast(`Removed '${id}'`, 'info');
  refresh();
}

function clearAll() {
  scheduler.clear();
  lastResult = null;
  document.getElementById('resultsContainer').innerHTML = '';
  toast('Graph cleared', 'info');
  refresh();
}

function loadDemo(name) {
  DEMOS[name](scheduler);
  lastResult = null;
  document.getElementById('resultsContainer').innerHTML = '';
  toast(`Demo '${name}' loaded — hit Run Scheduler`, 'success');
  refresh();
}

function runScheduler() {
  if (scheduler.tasks.size === 0) { toast('No tasks — load a demo first', 'error'); return; }
  lastResult = scheduler.schedule();
  updateStats();
  renderResults();
  drawGraph();
}

function refresh() {
  updateStats();
  updateTaskList();
  drawGraph();
}

// ═══════════════════════════════════════════════
//  GRAPH RENDERING (Canvas)
// ═══════════════════════════════════════════════

function layoutGraph() {
  nodePositions.clear();
  if (scheduler.tasks.size === 0) return;

  // Compute wave levels for layout
  const waveLevel = new Map();
  for (const id of scheduler.tasks.keys()) waveLevel.set(id, 0);
  const inDeg = new Map();
  for (const id of scheduler.tasks.keys()) inDeg.set(id, 0);
  for (const [, nbrs] of scheduler.adj) for (const v of nbrs) inDeg.set(v, inDeg.get(v) + 1);

  const q = [];
  for (const [id, d] of inDeg) if (d === 0) q.push(id);
  let h = 0;
  const tmpDeg = new Map(inDeg);
  while (h < q.length) {
    const u = q[h++];
    for (const v of scheduler.adj.get(u)) {
      waveLevel.set(v, Math.max(waveLevel.get(v), waveLevel.get(u) + 1));
      tmpDeg.set(v, tmpDeg.get(v) - 1);
      if (tmpDeg.get(v) === 0) q.push(v);
    }
  }

  // Group by wave
  const waves = new Map();
  for (const [id, lv] of waveLevel) {
    if (!waves.has(lv)) waves.set(lv, []);
    waves.get(lv).push(id);
  }

  // Sort each wave
  for (const [, ids] of waves) {
    ids.sort((a, b) => {
      const pa = scheduler.tasks.get(a).priority, pb = scheduler.tasks.get(b).priority;
      if (pa !== pb) return pb - pa;
      return a < b ? -1 : 1;
    });
  }

  const canvas = document.getElementById('graphCanvas');
  const container = document.getElementById('graphContainer');
  const W = container.clientWidth;
  const H = container.clientHeight;

  const maxWave = Math.max(...waves.keys());
  const numCols = maxWave + 1;
  const colSpacing = Math.min(180, (W - 160) / Math.max(numCols, 1));
  const startX = (W - (numCols - 1) * colSpacing) / 2;

  for (const [lv, ids] of waves) {
    const rowSpacing = Math.min(70, (H - 100) / Math.max(ids.length, 1));
    const startY = (H - (ids.length - 1) * rowSpacing) / 2;
    ids.forEach((id, i) => {
      nodePositions.set(id, {
        x: startX + lv * colSpacing,
        y: startY + i * rowSpacing
      });
    });
  }
}

function drawGraph() {
  const canvas = document.getElementById('graphCanvas');
  const container = document.getElementById('graphContainer');
  const dpr = window.devicePixelRatio || 1;
  canvas.width = container.clientWidth * dpr;
  canvas.height = container.clientHeight * dpr;
  canvas.style.width = container.clientWidth + 'px';
  canvas.style.height = container.clientHeight + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const empty = document.getElementById('graphEmpty');
  if (scheduler.tasks.size === 0) {
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  layoutGraph();

  const criticalSet = new Set(lastResult?.criticalPath || []);
  const bottleneckSet = new Set(lastResult?.bottlenecks || []);

  // Draw edges
  for (const [u, nbrs] of scheduler.adj) {
    for (const v of nbrs) {
      const p1 = nodePositions.get(u);
      const p2 = nodePositions.get(v);
      if (!p1 || !p2) continue;

      const isCritical = criticalSet.has(u) && criticalSet.has(v) && lastResult?.criticalPath;
      let cp = lastResult?.criticalPath || [];
      let isCritEdge = false;
      for (let i = 0; i < cp.length - 1; i++) {
        if (cp[i] === u && cp[i+1] === v) { isCritEdge = true; break; }
      }

      ctx.beginPath();
      ctx.moveTo(p1.x, p1.y);
      // Bezier curve for elegance
      const mx = (p1.x + p2.x) / 2;
      ctx.bezierCurveTo(mx, p1.y, mx, p2.y, p2.x, p2.y);

      if (isCritEdge) {
        ctx.strokeStyle = 'rgba(244, 114, 182, 0.6)';
        ctx.lineWidth = 2.5;
        ctx.setLineDash([]);
      } else {
        ctx.strokeStyle = 'rgba(148, 163, 184, 0.15)';
        ctx.lineWidth = 1.5;
        ctx.setLineDash([]);
      }
      ctx.stroke();

      // Arrowhead
      const angle = Math.atan2(p2.y - p1.y, p2.x - p1.x);
      const arrowLen = 8;
      const ax = p2.x - 22 * Math.cos(angle);
      const ay = p2.y - 22 * Math.sin(angle);
      ctx.beginPath();
      ctx.moveTo(ax, ay);
      ctx.lineTo(ax - arrowLen * Math.cos(angle - 0.4), ay - arrowLen * Math.sin(angle - 0.4));
      ctx.lineTo(ax - arrowLen * Math.cos(angle + 0.4), ay - arrowLen * Math.sin(angle + 0.4));
      ctx.closePath();
      ctx.fillStyle = isCritEdge ? 'rgba(244,114,182,0.6)' : 'rgba(148,163,184,0.2)';
      ctx.fill();
    }
  }

  // Draw nodes
  for (const [id, pos] of nodePositions) {
    const isCritical = criticalSet.has(id);
    const isBottleneck = bottleneckSet.has(id);
    const isHovered = hoveredNode === id;
    const r = isHovered ? 22 : 18;

    // Glow
    if (isCritical || isHovered) {
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, r + 8, 0, Math.PI * 2);
      const glow = ctx.createRadialGradient(pos.x, pos.y, r, pos.x, pos.y, r + 12);
      glow.addColorStop(0, isCritical ? 'rgba(244,114,182,0.15)' : 'rgba(99,102,241,0.15)');
      glow.addColorStop(1, 'transparent');
      ctx.fillStyle = glow;
      ctx.fill();
    }

    // Node circle
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, r, 0, Math.PI * 2);

    if (lastResult?.cycle) {
      ctx.fillStyle = 'rgba(244, 63, 94, 0.15)';
      ctx.strokeStyle = 'rgba(244, 63, 94, 0.5)';
    } else if (isCritical) {
      const grad = ctx.createLinearGradient(pos.x - r, pos.y - r, pos.x + r, pos.y + r);
      grad.addColorStop(0, 'rgba(244,114,182,0.2)');
      grad.addColorStop(1, 'rgba(168,85,247,0.2)');
      ctx.fillStyle = grad;
      ctx.strokeStyle = 'rgba(244,114,182,0.5)';
    } else if (isBottleneck) {
      ctx.fillStyle = 'rgba(251,191,36,0.1)';
      ctx.strokeStyle = 'rgba(251,191,36,0.4)';
    } else {
      ctx.fillStyle = 'rgba(129,140,248,0.08)';
      ctx.strokeStyle = 'rgba(129,140,248,0.25)';
    }

    ctx.lineWidth = isHovered ? 2 : 1.5;
    ctx.fill();
    ctx.stroke();

    // Label
    ctx.font = `${isHovered ? '600' : '500'} 10px 'JetBrains Mono', monospace`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = isCritical ? '#f472b6' : isBottleneck ? '#fbbf24' : '#c7d2fe';
    ctx.fillText(id, pos.x, pos.y);
  }
}

// Mouse interaction for graph tooltips
const graphCanvas = document.getElementById('graphCanvas');
const tooltip = document.getElementById('tooltip');

graphCanvas.addEventListener('mousemove', (e) => {
  const rect = graphCanvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  let found = null;
  for (const [id, pos] of nodePositions) {
    const dx = mx - pos.x, dy = my - pos.y;
    if (dx * dx + dy * dy < 400) { found = id; break; }
  }

  if (found && found !== hoveredNode) {
    hoveredNode = found;
    const t = scheduler.tasks.get(found);
    const deps = scheduler.dependenciesOf(found);
    const depnts = scheduler.dependentsOf(found);
    tooltip.innerHTML = `
      <div class="tt-id">${t.id}</div>
      <div class="tt-row"><strong>${t.name}</strong></div>
      <div class="tt-row">Duration: ${t.duration_ms}ms · Priority: ${t.priority}</div>
      <div class="tt-row">Depends on: ${deps.length ? deps.join(', ') : '(none)'}</div>
      <div class="tt-row">Blocks: ${depnts.length ? depnts.join(', ') : '(none)'}</div>
    `;
    tooltip.style.display = 'block';
    tooltip.style.left = (e.clientX + 14) + 'px';
    tooltip.style.top = (e.clientY + 14) + 'px';
    drawGraph();
  } else if (!found && hoveredNode) {
    hoveredNode = null;
    tooltip.style.display = 'none';
    drawGraph();
  } else if (found) {
    tooltip.style.left = (e.clientX + 14) + 'px';
    tooltip.style.top = (e.clientY + 14) + 'px';
  }
});

graphCanvas.addEventListener('mouseleave', () => {
  hoveredNode = null;
  tooltip.style.display = 'none';
  drawGraph();
});

// ═══════════════════════════════════════════════
//  RESULTS RENDERING
// ═══════════════════════════════════════════════

function renderResults() {
  const container = document.getElementById('resultsContainer');
  if (!lastResult) { container.innerHTML = ''; return; }

  if (!lastResult.success) {
    container.innerHTML = `
      <div class="results-panel">
        <div class="results-header">
          <div class="results-title">
            <span class="status-dot error"></span>
            ✖ Cycle Detected — Scheduling Aborted
          </div>
        </div>
        <div class="cycle-error">
          <div class="cycle-error-box">
            <div class="cycle-error-title">🔄 Circular Dependency Path</div>
            <div class="cycle-path">
              ${lastResult.cycle.map((id, i) => `
                ${i > 0 ? '<span class="cycle-arrow">→</span>' : ''}
                <span class="cycle-node">${id}</span>
              `).join('')}
              <span class="cycle-arrow">→</span>
              <span class="cycle-node" style="opacity:0.5">${lastResult.cycle[0]}</span>
            </div>
          </div>
        </div>
      </div>
    `;
    return;
  }

  const r = lastResult;
  const critSet = new Set(r.criticalPath);

  container.innerHTML = `
    <div class="results-panel">
      <div class="results-header">
        <div class="results-title">
          <span class="status-dot success"></span>
          ✔ Schedule Computed Successfully
        </div>
        <div class="results-stats">
          <span class="stat">Tasks <strong>${scheduler.tasks.size}</strong></span>
          <span class="stat">Edges <strong>${scheduler.edgeCount}</strong></span>
          <span class="stat">Waves <strong>${r.parallelWaves.length}</strong></span>
          <span class="stat">Bottlenecks <strong>${r.bottlenecks.length}</strong></span>
        </div>
      </div>
      <div class="results-body">

        <!-- Parallel Waves -->
        <div class="result-section">
          <div class="result-section-title">🌊 Parallel Execution Waves</div>
          ${r.parallelWaves.map((wave, i) => `
            <div class="wave-row" style="animation-delay: ${i * 80}ms">
              <span class="wave-label">Wave ${i + 1}</span>
              <span class="wave-badge ${wave.length === 1 ? 'bottleneck' : 'parallel'}">
                ${wave.length === 1 ? '⚠ bottleneck' : `∥ ×${wave.length}`}
              </span>
              <div class="wave-tasks">
                ${wave.map(id => `<span class="wave-task-chip ${critSet.has(id) ? 'critical' : ''}">${id}</span>`).join('')}
              </div>
            </div>
          `).join('')}
        </div>

        <!-- Critical Path -->
        <div class="result-section">
          <div class="result-section-title">🔥 Critical Path</div>
          <div class="critical-duration">${r.criticalPathDuration} ms</div>
          <div class="critical-path-flow">
            ${r.criticalPath.map((id, i) => `
              ${i > 0 ? '<span class="critical-arrow">▸</span>' : ''}
              <span class="critical-node">${id}</span>
            `).join('')}
          </div>
        </div>

        <!-- Bottlenecks -->
        ${r.bottlenecks.length > 0 ? `
        <div class="result-section">
          <div class="result-section-title">⚠ Bottleneck Stages</div>
          ${r.bottlenecks.map(id => `
            <div class="bottleneck-item">
              <span class="bottleneck-icon">⚠</span>
              <span class="bottleneck-id">${id}</span>
              <span style="color: var(--text-dim); font-size: 11px;">— sole task in wave, limits parallelism</span>
            </div>
          `).join('')}
        </div>` : ''}

        <!-- Execution Order -->
        <div class="result-section">
          <div class="result-section-title">📋 Flat Execution Order</div>
          <div class="exec-flow">
            ${r.executionOrder.map((id, i) => `
              ${i > 0 ? '<span class="exec-arrow">→</span>' : ''}
              <span class="exec-node">${id}</span>
            `).join('')}
          </div>
        </div>

      </div>
    </div>
  `;
}

//  KEYBOARD SHORTCUTS
// ═══════════════════════════════════════════════

document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'Enter' || e.key === 'r') runScheduler();
  if (e.key === '1') loadDemo('basic');
  if (e.key === '2') loadDemo('complex');
  if (e.key === '3') loadDemo('build');
  if (e.key === '4') loadDemo('cycle');
  if (e.key === 'c') clearAll();
});

// Enter key in form inputs
document.getElementById('taskId').addEventListener('keydown', (e) => { if (e.key === 'Enter') addTask(); });
document.getElementById('taskName').addEventListener('keydown', (e) => { if (e.key === 'Enter') addTask(); });
document.getElementById('depFrom').addEventListener('keydown', (e) => { if (e.key === 'Enter') addDependency(); });
document.getElementById('depTo').addEventListener('keydown', (e) => { if (e.key === 'Enter') addDependency(); });

// Resize handler
window.addEventListener('resize', () => { drawGraph(); });

// Init
refresh();
</script>
